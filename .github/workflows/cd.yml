name: CD - Deploy on PR Merge

on:
  push:
    branches: [ develop ]

jobs:
  checkout:
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.export.outputs.sha }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Export commit SHA
        id: export
        run: echo "sha=${{ github.sha }}" >> $GITHUB_OUTPUT

  build:
    needs: checkout
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: ./gradlew clean build

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: gmjd-jar
          path: build/libs/37-SOPKATHON-SERVER-IOS3-1.0-SNAPSHOT.jar

      - name: Show build/libs
        run: |
          echo "===== build/libs contents ====="
          ls -al build/libs

  upload:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: gmjd-jar
          path: ./build/libs

      - name: Check uploaded file exists
        run: |
          echo "::group::📂 List build/libs directory"
          ls -alR build/libs || echo "❌ build/libs 디렉토리 없음"
          echo "::endgroup::"

      - name: Ensure JAR exists
        run: |
          if [ ! -f build/libs/37-SOPKATHON-SERVER-IOS3-1.0-SNAPSHOT.jar ]; then
            echo "❌ JAR 파일이 존재하지 않습니다."
            exit 1
          else
            echo "✅ JAR 파일이 존재합니다. 복사 준비 완료."
          fi

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: build/libs/37-SOPKATHON-SERVER-IOS3-1.0-SNAPSHOT.jar
          target: ${{ secrets.APP_DIR }}

  deploy:
    needs: upload
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Run Deployment
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ${{ secrets.APP_DIR }}
            mv *.jar spring-boot-application.jar
            ./run.sh
